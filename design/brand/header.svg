<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400">
  <!-- ДронВестник / DroneHerald — README header, retro civil-defense poster style -->
  <defs>
    <clipPath id="frame"><rect width="1280" height="400"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- navy field -->
    <rect width="1280" height="400" fill="#0A3D62"/>

    <!-- radial cream rays from the loudspeaker -->
    <g fill="#F0E6CE" opacity="0.07">
      <path d="M330 210 L1280 -160 L1280 -40 Z"/>
      <path d="M330 210 L1280 10 L1280 120 Z"/>
      <path d="M330 210 L1280 190 L1280 290 Z"/>
      <path d="M330 210 L1280 360 L1280 470 Z"/>
      <path d="M330 210 L1180 620 L980 620 Z"/>
    </g>

    <!-- pole + bracket -->
    <rect x="96" y="40" width="16" height="360" fill="#07293F"/>
    <rect x="106" y="204" width="60" height="12" fill="#07293F"/>

    <!-- street PA horn, pointing right -->
    <g>
      <rect x="150" y="188" width="52" height="44" rx="4" fill="#F0E6CE"/>
      <path d="M198 196 L330 138 L330 282 L198 224 Z" fill="#F0E6CE"/>
      <path d="M330 138 L344 132 L344 288 L330 282 Z" fill="#C0392B"/>
    </g>

    <!-- sound arcs -->
    <g fill="none" stroke="#C0392B" stroke-width="14" stroke-linecap="round">
      <path d="M392 156 A88 88 0 0 1 392 264"/>
      <path d="M438 122 A132 132 0 0 1 438 298"/>
      <path d="M484 88  A176 176 0 0 1 484 332"/>
    </g>

    <!-- drone silhouette, top right, inside dashed spotting ring -->
    <g transform="translate(1185 66)">
      <circle r="54" fill="none" stroke="#C0392B" stroke-width="4" stroke-dasharray="14 10"/>
      <g fill="#F0E6CE">
        <rect x="-16" y="-8" width="32" height="18" rx="5"/>
        <rect x="-44" y="-16" width="30" height="6" rx="3" transform="rotate(-24)"/>
        <rect x="14"  y="-16" width="30" height="6" rx="3" transform="rotate(24)"/>
        <rect x="-44" y="10"  width="30" height="6" rx="3" transform="rotate(24 -29 13)"/>
        <rect x="14"  y="10"  width="30" height="6" rx="3" transform="rotate(-24 29 13)"/>
        <ellipse cx="-40" cy="-26" rx="18" ry="4"/>
        <ellipse cx="40"  cy="-26" rx="18" ry="4"/>
        <ellipse cx="-40" cy="26"  rx="18" ry="4"/>
        <ellipse cx="40"  cy="26"  rx="18" ry="4"/>
      </g>
    </g>

    <!-- wordmark -->
    <g font-family="Arial, Helvetica, sans-serif" text-anchor="start">
      <text x="545" y="188" font-size="72" font-weight="900" letter-spacing="2" fill="#F0E6CE">ДРОНВЕСТНИК</text>
      <rect x="545" y="210" width="392" height="44" fill="#C0392B"/>
      <text x="563" y="242" font-size="30" font-weight="700" letter-spacing="9" fill="#F0E6CE">DRONEHERALD</text>
      <text x="549" y="296" font-size="26" font-weight="400" fill="#F0E6CE" opacity="0.85">озвучивает каналы оповещения об угрозах БПЛА</text>
    </g>

    <!-- bottom hazard stripe -->
    <rect y="388" width="1280" height="12" fill="#C0392B"/>
  </g>
</svg>
