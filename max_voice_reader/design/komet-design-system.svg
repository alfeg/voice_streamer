      <text y="36" font-size="32" font-weight="700" fill="#1B1B21">Display / 32 / 700</text>
      <text y="76" font-size="22" font-weight="600" fill="#1B1B21">Headline / 22 / 600</text>
      <text y="112" font-size="18" font-weight="600" fill="#1B1B21">Title / 18 / 600</text>
      <text y="144" font-size="16" font-weight="500" fill="#1B1B21">Subtitle / 16 / 500</text>
      <text y="174" font-size="14" font-weight="400" fill="#46464F">Body / 14 / 400 — основной текст в интерфейсе.</text>
      <text y="200" font-size="13" font-weight="400" fill="#46464F">Caption / 13 / 400 — подсказки, метаданные.</text>
      <text y="224" font-size="12" font-weight="500" fill="#767680">LABEL / 12 / 500 / UPPER</text>
    </g>
