name: Release DroneHerald

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 1.0.0 (a tag v<version> will be created)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "name=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V (build ${{ github.run_number }})"

      - name: Provision Piper RU TTS model (zip asset)
        env:
          VOICE: vits-piper-ru_RU-irina-medium
          BASE: https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models
        run: |
          set -euo pipefail
          mkdir -p assets/tts
          if [ ! -f "assets/tts/$VOICE.zip" ]; then
            curl -fL --retry 3 -o /tmp/tts.tar.bz2 "$BASE/$VOICE.tar.bz2"
            tar xjf /tmp/tts.tar.bz2 -C assets/tts
            if [ ! -f "assets/tts/$VOICE/model.onnx" ]; then
              mv "assets/tts/$VOICE"/*.onnx "assets/tts/$VOICE/model.onnx"
            fi
            ( cd "assets/tts/$VOICE" && zip -qr "../$VOICE.zip" . )
          fi

      - name: Set up release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF
          echo "Release signing configured"

      - run: flutter pub get

      - name: Build release APKs
        run: >
          flutter build apk --release --flavor komet --split-per-abi
          --build-name=${{ steps.ver.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Rename APKs with version
        run: |
          set -euo pipefail
          cd build/app/outputs/flutter-apk
          shopt -s nullglob
          found=0
          for f in app-*-komet-release.apk; do
            abi="${f#app-}"; abi="${abi%-komet-release.apk}"
            mv "$f" "DroneHerald-${{ steps.ver.outputs.name }}-$abi.apk"
            found=1
          done
          [ "$found" = 1 ] || { echo "no release APKs found"; ls -lh; exit 1; }
          ls -lh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: DroneHerald ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/DroneHerald-*.apk
