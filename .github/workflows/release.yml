name: Release MaxReader

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 1.0.0 (a tag v<version> will be created)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: max_voice_reader
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "name=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V (build ${{ github.run_number }})"

      - name: Provision Piper RU TTS model (zip asset)
        env:
          VOICE: vits-piper-ru_RU-irina-medium
          BASE: https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models
        run: |
          set -euo pipefail
          mkdir -p assets/tts
          if [ ! -f "assets/tts/$VOICE.zip" ]; then
            curl -fL --retry 3 -o /tmp/tts.tar.bz2 "$BASE/$VOICE.tar.bz2"
            tar xjf /tmp/tts.tar.bz2 -C assets/tts
            if [ ! -f "assets/tts/$VOICE/model.onnx" ]; then
              mv "assets/tts/$VOICE"/*.onnx "assets/tts/$VOICE/model.onnx"
            fi
            ( cd "assets/tts/$VOICE" && zip -qr "../$VOICE.zip" . )
          fi

      - run: flutter pub get

      - name: Build release APKs
        run: >
          flutter build apk --release --flavor komet --split-per-abi
          --build-name=${{ steps.ver.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Rename APKs with version
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-komet-*-release.apk; do
            abi="${f#app-komet-}"; abi="${abi%-release.apk}"
            mv "$f" "MaxReader-${{ steps.ver.outputs.name }}-$abi.apk"
          done
          ls -lh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: MaxReader ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: max_voice_reader/build/app/outputs/flutter-apk/MaxReader-*.apk
